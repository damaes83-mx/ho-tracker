<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Control de Asistencias · C&amp;C MX-CAM</title>
<style>
:root{
  --bg:#F0F7FF;--surface:#fff;--surface2:#E4F0FB;--surface3:#D0E6F8;
  --border:#C2D9EF;--border2:#A8C8E8;
  --text:#1A3550;--text2:#4A6A85;--text3:#8AAAC0;
  --acc:#2563EB;--acc-h:#1D4ED8;--acc-l:#EFF6FF;
  --ho-bg:#DBEAFE;--ho-t:#1E40AF;--ho-b:#93C5FD;
  --azc-bg:#E0F2FE;--azc-t:#075985;--azc-b:#7DD3FC;
  --vac-bg:#DCFCE7;--vac-t:#166534;--vac-b:#86EFAC;
  --enf-bg:#FEE2E2;--enf-t:#991B1B;--enf-b:#FCA5A5;
  --ops-bg:#FEF3C7;--ops-t:#92400E;--ops-b:#FCD34D;
  --r:8px;--rs:5px;--sh:0 1px 3px rgba(26,53,80,.08),0 4px 14px rgba(26,53,80,.05);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);font-family:'Segoe UI',system-ui,sans-serif;color:var(--text);min-height:100vh;}

/* HEADER */
.hdr{background:var(--surface);border-bottom:1px solid var(--border);height:54px;padding:0 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:var(--sh);}
.hdr-brand{display:flex;align-items:center;gap:10px;}
.hdr-icon{width:32px;height:32px;background:var(--acc);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:16px;}
.hdr-name{font-size:14px;font-weight:700;color:var(--text);}
.hdr-sub{font-size:10.5px;color:var(--text3);}
.week-nav{display:flex;align-items:center;gap:8px;}
.nav-btn{width:28px;height:28px;border-radius:50%;border:1px solid var(--border2);background:var(--surface);cursor:pointer;font-size:15px;color:var(--text2);transition:all .15s;display:flex;align-items:center;justify-content:center;}
.nav-btn:hover{background:var(--acc);color:#fff;border-color:var(--acc);}
.wk-lbl{font-size:12.5px;font-weight:600;color:var(--text);min-width:190px;text-align:center;}
.today-btn{padding:4px 12px;border-radius:16px;border:1px solid var(--border2);background:var(--surface2);font-size:11.5px;font-weight:600;color:var(--text2);cursor:pointer;}
.today-btn:hover{background:var(--acc);color:#fff;border-color:var(--acc);}

/* TABS */
.tabs{display:flex;gap:0;padding:16px 24px 0;border-bottom:1px solid var(--border);}
.tab{padding:8px 20px;font-size:12.5px;font-weight:600;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;}
.tab:hover{color:var(--text2);}
.tab.active{color:var(--acc);border-bottom-color:var(--acc);}

/* CONTENT */
.content{max-width:1080px;margin:0 auto;padding:20px 20px;}

/* LEGEND */
.legend{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;}
.leg{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:14px;font-size:11px;font-weight:600;border:1px solid;}
.leg-ho{background:var(--ho-bg);color:var(--ho-t);border-color:var(--ho-b);}
.leg-azc{background:var(--azc-bg);color:var(--azc-t);border-color:var(--azc-b);}
.leg-vac{background:var(--vac-bg);color:var(--vac-t);border-color:var(--vac-b);}
.leg-enf{background:var(--enf-bg);color:var(--enf-t);border-color:var(--enf-b);}
.leg-ops{background:var(--ops-bg);color:var(--ops-t);border-color:var(--ops-b);}
.leg-ho-note{font-size:10.5px;color:var(--text3);display:flex;align-items:center;gap:4px;margin-left:4px;}

/* TABLE CARD */
.tcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;}
.twrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
thead th{padding:8px 12px;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--text3);text-align:center;border-bottom:2px solid var(--border);background:var(--surface2);}
thead th:first-child{text-align:left;min-width:110px;}
thead th.tcol{background:#DBEAFE;color:var(--acc);}

/* GROUP HEADER ROW */
.grp-row td{background:var(--surface3);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text2);padding:5px 12px;border-top:1px solid var(--border2);border-bottom:1px solid var(--border);}

/* DATA ROWS — alternating */
tbody tr.row-even td{background:#fff;}
tbody tr.row-odd td{background:var(--bg);}
tbody tr:hover td{background:#DBEAFE80 !important;}

/* PERSON CELL */
td.pcell{padding:5px 12px;font-size:12px;font-weight:600;color:var(--text);white-space:nowrap;}
td.dcell{padding:4px 6px;text-align:center;}

/* STATUS BUTTON */
.sbtn{display:inline-flex;align-items:center;justify-content:center;gap:3px;width:100%;min-width:68px;padding:5px 6px;border-radius:var(--rs);border:1.5px solid var(--border);background:#fff;font-size:11px;font-weight:600;cursor:pointer;transition:all .14s;color:var(--text3);}
.sbtn:hover{border-color:var(--acc);background:var(--acc-l);}
.sbtn .si{font-size:14px;line-height:1;}
.sbtn.s-ho{background:var(--ho-bg);color:var(--ho-t);border-color:var(--ho-b);}
.sbtn.s-azc{background:var(--azc-bg);color:var(--azc-t);border-color:var(--azc-b);}
.sbtn.s-vac{background:var(--vac-bg);color:var(--vac-t);border-color:var(--vac-b);}
.sbtn.s-enf{background:var(--enf-bg);color:var(--enf-t);border-color:var(--enf-b);}
.sbtn.s-ops{background:var(--ops-bg);color:var(--ops-t);border-color:var(--ops-b);}
td.dpast .sbtn{opacity:.65;}

/* POPUP */
.pop-ov{position:fixed;inset:0;background:rgba(26,53,80,.3);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .18s;}
.pop-ov.show{opacity:1;pointer-events:all;}
.pop{background:#fff;border-radius:12px;padding:18px;min-width:200px;box-shadow:0 8px 36px rgba(26,53,80,.18);transform:scale(.95);transition:transform .18s;}
.pop-ov.show .pop{transform:scale(1);}
.pop-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px;}
.popt{display:flex;align-items:center;gap:8px;width:100%;padding:8px 12px;border-radius:var(--rs);border:1.5px solid var(--border);background:#fff;cursor:pointer;font-size:12.5px;font-weight:600;margin-bottom:6px;transition:all .14s;}
.popt:hover{transform:translateX(2px);}
.popt .pi{font-size:18px;}
.popt:last-of-type{margin-bottom:0;}
.popt.o-ho{border-color:var(--ho-b);color:var(--ho-t);}.popt.o-ho:hover{background:var(--ho-bg);}
.popt.o-azc{border-color:var(--azc-b);color:var(--azc-t);}.popt.o-azc:hover{background:var(--azc-bg);}
.popt.o-vac{border-color:var(--vac-b);color:var(--vac-t);}.popt.o-vac:hover{background:var(--vac-bg);}
.popt.o-enf{border-color:var(--enf-b);color:var(--enf-t);}.popt.o-enf:hover{background:var(--enf-bg);}
.popt.o-ops{border-color:var(--ops-b);color:var(--ops-t);}.popt.o-ops:hover{background:var(--ops-bg);}
.popt.o-clr{border-color:var(--border2);color:var(--text2);}.popt.o-clr:hover{background:var(--surface2);}
.pop-cancel{width:100%;margin-top:10px;padding:6px;border-radius:var(--rs);border:none;background:transparent;font-size:11.5px;color:var(--text3);cursor:pointer;}

/* SYNC BAR */
.sbar{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;background:var(--surface2);border-top:1px solid var(--border);font-size:11px;color:var(--text3);}
.sdot{width:7px;height:7px;border-radius:50%;background:var(--vac-b);flex-shrink:0;}
.sdot.err{background:var(--enf-b);}
.sbtns{display:flex;gap:6px;}
.sync-btn{padding:4px 12px;border-radius:14px;border:1px solid var(--border2);background:#fff;font-size:11px;font-weight:600;color:var(--text2);cursor:pointer;}
.sync-btn:hover{background:var(--acc);color:#fff;border-color:var(--acc);}

/* ── EVENTS TAB ───────────────────────────────── */
.ev-grid{display:flex;flex-direction:column;gap:16px;}
.ev-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;}
.ev-head{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:var(--surface2);border-bottom:1px solid var(--border);}
.ev-title{font-size:12.5px;font-weight:700;color:var(--text);}
.ev-icon{font-size:18px;margin-right:6px;}
.add-btn{padding:5px 14px;border-radius:14px;background:var(--acc);color:#fff;border:none;font-size:11.5px;font-weight:600;cursor:pointer;}
.add-btn:hover{background:var(--acc-h);}
.ev-table{width:100%;border-collapse:collapse;}
.ev-table th{padding:7px 14px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--text3);text-align:left;border-bottom:1px solid var(--border);background:var(--surface2);}
.ev-table td{padding:7px 14px;font-size:12px;color:var(--text);border-bottom:1px solid var(--border);}
.ev-table tr:last-child td{border-bottom:none;}
.ev-table tr:nth-child(even) td{background:var(--bg);}
.ev-select,.ev-date{padding:5px 8px;border:1px solid var(--border2);border-radius:var(--rs);font-size:12px;color:var(--text);background:#fff;cursor:pointer;min-width:130px;}
.ev-select:focus,.ev-date:focus{outline:none;border-color:var(--acc);}
.del-btn{padding:3px 10px;border-radius:12px;border:1px solid var(--enf-b);background:#fff;color:var(--enf-t);font-size:11px;cursor:pointer;}
.del-btn:hover{background:var(--enf-bg);}
.empty-ev{padding:20px;text-align:center;color:var(--text3);font-size:12px;}

@media(max-width:680px){.content{padding:12px 10px;}.hdr{padding:0 12px;}.wk-lbl{min-width:130px;font-size:11px;}}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-brand">
    <div class="hdr-icon">🗓️</div>
    <div><div class="hdr-name">Control de Asistencias</div><div class="hdr-sub">Cultura &amp; Estrategia de Cambio · MX-CAM</div></div>
  </div>
  <div class="week-nav" id="weekNavBar">
    <button class="nav-btn" onclick="changeWeek(-1)">‹</button>
    <span class="wk-lbl" id="wkLbl">—</span>
    <button class="nav-btn" onclick="changeWeek(1)">›</button>
    <button class="today-btn" onclick="goToday()">Hoy</button>
  </div>
</header>

<div class="tabs">
  <div class="tab active" onclick="showTab('asist',this)">📋 Asistencias</div>
  <div class="tab" onclick="showTab('events',this)">📌 Eventos</div>
</div>

<!-- ══ ASISTENCIAS ══════════════════════════════════════════════════════ -->
<div id="view-asist" class="content">
  <div class="legend">
    <div class="leg leg-ho">🏠 HO</div>
    <div class="leg leg-azc">🏢 Azcapo</div>
    <div class="leg leg-vac">🌴 Vacaciones</div>
    <div class="leg leg-enf">🤒 Enfermedad</div>
    <div class="leg leg-ops">🏪 Visitas Ops</div>
    <span class="leg-ho-note">⚠️ Solo 1 día HO por semana</span>
  </div>
  <div class="tcard">
    <div class="twrap"><table><thead id="tHead"></thead><tbody id="tBody"></tbody></table></div>
    <div class="sbar">
      <div style="display:flex;align-items:center;gap:6px;"><div class="sdot" id="sdot"></div><span id="smsg">Guardado localmente</span></div>
      <div class="sbtns">
        <button class="sync-btn" onclick="exportJSON()">↓ Exportar</button>
        <button class="sync-btn" onclick="importJSON()">↑ Importar</button>
        <button class="sync-btn" onclick="syncSP()">↕ SharePoint</button>
      </div>
    </div>
  </div>
</div>

<!-- ══ EVENTOS ══════════════════════════════════════════════════════════ -->
<div id="view-events" class="content" style="display:none;">
  <div class="ev-grid" id="evGrid"></div>
</div>

<!-- POPUP -->
<div class="pop-ov" id="popOv" onclick="closePop(event)">
  <div class="pop">
    <div class="pop-title" id="popTitle">Selecciona estatus</div>
    <button class="popt o-ho"  onclick="setSt('HO')">        <span class="pi">🏠</span>Home Office</button>
    <button class="popt o-azc" onclick="setSt('Azcapo')">    <span class="pi">🏢</span>Azcapo</button>
    <button class="popt o-vac" onclick="setSt('Vacaciones')"><span class="pi">🌴</span>Vacaciones</button>
    <button class="popt o-enf" onclick="setSt('Enfermedad')"><span class="pi">🤒</span>Enfermedad</button>
    <button class="popt o-ops" onclick="setSt('Visitas Ops')"><span class="pi">🏪</span>Visitas Ops</button>
    <button class="popt o-clr" onclick="setSt('')">          <span class="pi">✕</span>Limpiar</button>
    <button class="pop-cancel"  onclick="closePop()">Cancelar</button>
  </div>
</div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
const GROUPS=[
  {name:'STAFF & CROSS', members:['Diana','Conny','Dany P','Montse']},
  {name:'OPS & SCH RE',  members:['Dan','Ire','Dany Ri','Anahí']},
  {name:'Cultura',       members:['Marlene','Gaby','Nallely']},
];
const TEAM=GROUPS.flatMap(g=>g.members);
// Personas para eventos: equipo + externos
const ALL_PPL=[...TEAM,'Dany Z','Hila','Isa','Ana','Vero'];
const SALA_PPL=TEAM; // solo equipo core para sala
const DAYS_ES=['Lunes','Martes','Miércoles','Jueves','Viernes'];
const ST={
  'HO':        {icon:'🏠',cls:'s-ho', lbl:'HO'},
  'Azcapo':    {icon:'🏢',cls:'s-azc',lbl:'Azc.'},
  'Vacaciones':{icon:'🌴',cls:'s-vac',lbl:'Vac.'},
  'Enfermedad':{icon:'🤒',cls:'s-enf',lbl:'Enf.'},
  'Visitas Ops':{icon:'🏪',cls:'s-ops',lbl:'Ops'},
};
const EV_TYPES=[
  {id:'weekly',  label:'Weekly',    icon:'📊'},
  {id:'monthly', label:'Monthly',   icon:'📆'},
  {id:'junta10', label:'Junta 10\'',icon:'☕'},
];
const SK='ho_v2', EK='ho_ev_v1';

// ── STATE ─────────────────────────────────────────────────────────────────────
let data=load(SK,{});
let evData=load(EK,[]);
let weekOff=0, activeCell=null;

function load(k,def){try{const r=localStorage.getItem(k);return r?JSON.parse(r):def;}catch{return def;}}
function save(){try{localStorage.setItem(SK,JSON.stringify(data));localStorage.setItem(EK,JSON.stringify(evData));}catch(e){}setSyncMsg('Guardado localmente','ok');}

// ── DATE UTILS ────────────────────────────────────────────────────────────────
function monday(off){
  const d=new Date();const day=d.getDay();const diff=day===0?-6:1-day;
  d.setHours(0,0,0,0);d.setDate(d.getDate()+diff+off*7);return d;
}
function addD(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}
function fmt(d){return d.toISOString().slice(0,10);}
function fmtS(d){return d.toLocaleDateString('es-MX',{day:'2-digit',month:'short'});}
function isToday(d){return fmt(d)===fmt(new Date());}
function isPast(d){const t=new Date();t.setHours(0,0,0,0);return d<t;}
function weekDates(dateStr){
  const d=new Date(dateStr+'T12:00:00');const day=d.getDay();
  const diff=day===0?-6:1-day;const mon=new Date(d);mon.setDate(d.getDate()+diff);
  return Array.from({length:5},(_,i)=>{const r=new Date(mon);r.setDate(mon.getDate()+i);return fmt(r);});
}

// ── TABS ──────────────────────────────────────────────────────────────────────
function showTab(id,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('view-asist').style.display=id==='asist'?'':'none';
  document.getElementById('view-events').style.display=id==='events'?'':'none';
  document.getElementById('weekNavBar').style.display=id==='asist'?'flex':'none';
  if(id==='events') renderEvents();
}

// ── RENDER ATTENDANCE ─────────────────────────────────────────────────────────
function render(){
  const mon=monday(weekOff);
  const days=Array.from({length:5},(_,i)=>addD(mon,i));
  const from=fmtS(days[0]),to=fmtS(days[4]),yr=days[0].getFullYear();
  document.getElementById('wkLbl').textContent=from+' – '+to+' · '+yr;

  // header
  document.getElementById('tHead').innerHTML='<tr>'+
    '<th style="text-align:left;">Persona</th>'+
    days.map((d,i)=>`<th class="${isToday(d)?'tcol':''}">${DAYS_ES[i]}<br><span style="font-weight:400;font-size:10px;">${fmtS(d)}</span></th>`).join('')+
    '</tr>';

  // body — grouped
  let html='';let rowIdx=0;
  GROUPS.forEach(g=>{
    html+=`<tr class="grp-row"><td colspan="6">${g.name}</td></tr>`;
    g.members.forEach(person=>{
      const cls=rowIdx%2===0?'row-even':'row-odd';rowIdx++;
      const cells=days.map((d,di)=>{
        const ds=fmt(d);const st=(data[ds]||{})[person]||'';
        const m=ST[st];const past=isPast(d)&&!isToday(d);
        const btnCls=m?m.cls:'';
        const inner=m?`<span class="si">${m.icon}</span><span>${m.lbl}</span>`
                     :`<span style="font-size:16px;color:var(--border2)">·</span>`;
        const todayStyle=isToday(d)?'style="background:#EFF6FF;"':'';
        return `<td class="dcell${past?' dpast':''}" ${todayStyle}>
          <button class="sbtn ${btnCls}" onclick="openPop('${person}','${ds}','${di}')" title="${person} · ${DAYS_ES[di]}">${inner}</button></td>`;
      }).join('');
      html+=`<tr class="${cls}"><td class="pcell">${person}</td>${cells}</tr>`;
    });
  });
  document.getElementById('tBody').innerHTML=html;
}

// ── POPUP ─────────────────────────────────────────────────────────────────────
function openPop(person,ds,di){
  activeCell={person,ds};
  document.getElementById('popTitle').textContent=person+' · '+DAYS_ES[di];
  document.getElementById('popOv').classList.add('show');
}
function closePop(e){
  if(!e||e.target===document.getElementById('popOv'))
    document.getElementById('popOv').classList.remove('show');
}
function setSt(val){
  if(!activeCell) return;
  const {person,ds}=activeCell;
  // Regla HO: solo 1 día por semana
  if(val==='HO'){
    weekDates(ds).forEach(d=>{
      if(data[d]&&data[d][person]==='HO') delete data[d][person];
    });
  }
  if(!data[ds]) data[ds]={};
  if(val) data[ds][person]=val; else delete data[ds][person];
  save(); render();
  document.getElementById('popOv').classList.remove('show');
}

// ── WEEK NAV ──────────────────────────────────────────────────────────────────
function changeWeek(d){weekOff+=d;render();}
function goToday(){weekOff=0;render();}

// ── SYNC / EXPORT / IMPORT ────────────────────────────────────────────────────
function setSyncMsg(msg,s){
  document.getElementById('smsg').textContent=msg;
  document.getElementById('sdot').className='sdot'+(s==='err'?' err':'');
}
function exportJSON(){
  const b=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);
  a.download='ho-data-'+fmt(new Date())+'.json';a.click();
  setSyncMsg('Exportado ✓','ok');
}
function importJSON(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.json';
  inp.onchange=async e=>{
    const f=e.target.files[0];if(!f) return;
    try{
      const remote=JSON.parse(await f.text());
      Object.keys(remote).forEach(date=>{
        if(!data[date]) data[date]={};
        Object.keys(remote[date]).forEach(p=>{if(remote[date][p]) data[date][p]=remote[date][p];});
      });
      save();render();setSyncMsg('Importado y combinado ✓','ok');
    }catch(err){setSyncMsg('Error: '+err.message,'err');}
  };inp.click();
}
async function syncSP(){
  const SP='/sites/CulturayEstrategiadeCambioMX-CAM';
  const FILE=SP+'/Shared Documents/Cultura y Estrategia de Cambio/Días de HO/ho-data.json';
  setSyncMsg('Sincronizando…','ok');
  try{
    const rr=await fetch(SP+'/_api/web/GetFileByServerRelativePath(decodedurl=\''+FILE+'\')/$value',{credentials:'include'});
    if(rr.ok){const rem=await rr.json();Object.keys(rem).forEach(d=>{if(!data[d])data[d]={};Object.assign(rem[d],data[d]);data[d]=rem[d];});}
    const dig=(await(await fetch(SP+'/_api/contextinfo',{method:'POST',headers:{Accept:'application/json;odata=verbose'},credentials:'include'})).json()).d.GetContextWebInformation.FormDigestValue;
    const wr=await fetch(SP+'/_api/web/GetFileByServerRelativePath(decodedurl=\''+FILE+'\')/$value',{method:'PUT',credentials:'include',headers:{'X-RequestDigest':dig,'Content-Type':'application/json'},body:JSON.stringify(data)});
    if(!wr.ok) throw new Error(wr.status);
    save();render();setSyncMsg('SharePoint sincronizado · '+new Date().toLocaleTimeString('es-MX'),'ok');
  }catch(e){setSyncMsg('Abre desde SharePoint para sincronizar','err');}
}
if(location.hostname.includes('wal-mart.com')) syncSP();

// ── EVENTS ────────────────────────────────────────────────────────────────────
function renderEvents(){
  const grid=document.getElementById('evGrid');
  grid.innerHTML=EV_TYPES.map(et=>{
    const rows=evData.filter(e=>e.tipo===et.id);
    const opts=ALL_PPL.map(p=>`<option value="${p}">${p}</option>`).join('');
    const salaOpts=SALA_PPL.map(p=>`<option value="${p}">${p}</option>`).join('');
    const tbody=rows.length===0
      ? `<tr><td colspan="4" class="empty-ev">Sin registros — agrega uno con el botón +</td></tr>`
      : rows.map((ev,i)=>`<tr>
          <td><select class="ev-select" onchange="evUpdate('${ev.id}','encargado',this.value)">
            ${ALL_PPL.map(p=>`<option${p===ev.encargado?' selected':''}>${p}</option>`).join('')}
          </select></td>
          <td><input type="date" class="ev-date" value="${ev.fecha}" onchange="evUpdate('${ev.id}','fecha',this.value)"/></td>
          <td><select class="ev-select" onchange="evUpdate('${ev.id}','sala',this.value)">
            <option value="">— Sin sala —</option>
            ${SALA_PPL.map(p=>`<option${p===ev.sala?' selected':''}>${p}</option>`).join('')}
          </select></td>
          <td><button class="del-btn" onclick="evDel('${ev.id}')">✕</button></td>
        </tr>`).join('');
    return `<div class="ev-card">
      <div class="ev-head">
        <div><span class="ev-icon">${et.icon}</span><span class="ev-title">${et.label}</span></div>
        <button class="add-btn" onclick="evAdd('${et.id}')">+ Agregar</button>
      </div>
      <table class="ev-table">
        <thead><tr><th>Encargado</th><th>Fecha</th><th>Reserva de sala</th><th></th></tr></thead>
        <tbody>${tbody}</tbody>
      </table>
    </div>`;
  }).join('');
}
function evAdd(tipo){
  evData.push({id:Date.now().toString(),tipo,encargado:ALL_PPL[0],fecha:fmt(new Date()),sala:''});
  save();renderEvents();
}
function evUpdate(id,field,val){
  const ev=evData.find(e=>e.id===id);if(ev){ev[field]=val;save();}
}
function evDel(id){
  evData=evData.filter(e=>e.id!==id);save();renderEvents();
}

// ── INIT ──────────────────────────────────────────────────────────────────────
render();
document.addEventListener('keydown',e=>{
  if(e.key==='Escape') document.getElementById('popOv').classList.remove('show');
  if(!e.target.closest('input,select')){
    if(e.key==='ArrowLeft') changeWeek(-1);
    if(e.key==='ArrowRight') changeWeek(1);
  }
});
</script>
